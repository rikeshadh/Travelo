<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travelo</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  
  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
  
  <!-- Your Styles -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <div class="container">
      <div class="logo">
        <img src="images/NavLogo.png" alt="Travelo Logo" />
      </div>
      <div class="nav-icons">
        <i class="fas fa-bars"></i>
        <i class="fas fa-user"></i>
      </div>
    </div>
  </header>

  <section id="hero">
  <h1>Unlock Your Ultimate Stay</h1>
  <p>Dive into deals on stylish hotels, comfortable homes, and beyond.</p>

  <div class="searchBar-container">
    <div class="searchBar-box">
      
      <!-- Where -->
      <div class="searchBar-field">
        <i class="fas fa-map-marker-alt"></i>
        <div class="field-content">
          <label>Where</label>
          <input type="text" id="destination" placeholder="Search destinations" />
        </div>
      </div>

      <!-- Check in -->
      <div class="searchBar-field" id="checkin-field">
        <i class="fas fa-calendar-alt"></i>
        <div class="field-content">
          <label>Check in</label>
          <input type="text" id="checkin" placeholder="Add date" readonly />
        </div>
      </div>

      <!-- Check out -->
      <div class="searchBar-field" id="checkout-field">
        <i class="fas fa-calendar-alt"></i>
        <div class="field-content">
          <label>Check out</label>
          <input type="text" id="checkout" placeholder="Add date" readonly />
        </div>
      </div>

      <!-- Guests -->
        <div id="guests-trigger" class="searchBar-field">
  <div class="field-content">
    <label>Who</label>
    <input type="text" id="guests" placeholder="Add guests" readonly />
  </div>
</div>

<div id="guest-dropdown" class="dropdown hidden">
  <div class="row">
    <span>Adults</span>
    <div>
      <button class="minus" data-type="adults">-</button>
      <span id="adults-count">2</span>
      <button class="plus" data-type="adults">+</button>
    </div>
  </div>
  <div class="row">
    <span>Children</span>
    <div>
      <button class="minus" data-type="children">-</button>
      <span id="children-count">0</span>
      <button class="plus" data-type="children">+</button>
    </div>
  </div>
  <div class="row">
    <label><input type="checkbox" id="pets" /> Bringing pets</label>
  </div>
  <button id="done-btn">Done</button>
</div>
</div>
      <!-- Search Button -->
      <button class="search-button"><i class="fas fa-search"></i></button>
    </div>
  </div>
</section>
 
  <!-- Flatpickr Script -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <!-- Your Custom Script -->
  <script src="script.js"></script>
</body>
</html>

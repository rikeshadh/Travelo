<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travelo</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  
  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
  
  <!-- Your Styles -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <div class="container">
      <div class="logo">
        <img src="images/NavLogo.png" alt="Travelo Logo" />
      </div>
      <div class="nav-icons">
        <i class="fas fa-bars"></i>
        <i class="fas fa-user"></i>
      </div>
    </div>
  </header>

  <section id="hero">
    <h1>Unlock Your Ultimate Stay</h1>
    <div class="searchBar-container">
      <div class="searchBar-box">
        <!-- Destination -->
        <div class="searchBar-field">
          <input type="text" id="destination" placeholder="Where are you going?" />
        </div>

        <!-- Dates -->
        <div class="searchBar-field" id="date-trigger">
          <input type="text" id="date-range" readonly value="Add dates" />
          <div id="calendar-dropdown" class="dropdown hidden"></div>
        </div>

        <!-- Guests -->
        <div class="searchBar-field" id="guests-trigger">
          <input type="text" id="guests" readonly value="Guests" />
          <div id="guest-dropdown" class="dropdown hidden">
            <div class="row">
              Adults:
              <button class="minus" data-type="adults">-</button>
              <span id="adults-count">2</span>
              <button class="plus" data-type="adults">+</button>
            </div>
            <div class="row">
              Children:
              <button class="minus" data-type="children">-</button>
              <span id="children-count">0</span>
              <button class="plus" data-type="children">+</button>
            </div>
            <div class="row">
              <label><input type="checkbox" id="pets" /> Pets?</label>
            </div>
            <button id="done-btn">Done</button>
          </div>
        </div>

        <!-- Search Button -->
        <button class="search-button">Search</button>
      </div>
    </div>
  </section>

  <!-- Flatpickr Script -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <!-- Your Custom Script -->
  <script src="script.js"></script>
</body>
</html>

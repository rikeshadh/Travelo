<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travelo</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <div class="container">
      <div class="logo">
        <img src="images/NavLogo.png" alt="Travelo Logo" />
      </div>
      <div class="nav-icons">
        <div class="menu-wrapper relative">
            <i id="hamburger-menu" class="fas fa-bars"></i>
            <div id="menu-dropdown" class="hidden menu-dropdown">
            <ul>
                <li><a href="#">Help Center</a></li>
                <li><a href="#">Host</a></li>
                <li><a href="#">Gift cards</a></li>
            </ul>
            <div class="dropdown-divider"></div>
            <button id="login-signup-btn">Log in or sign up</button>
            </div>
        </div>
        </div>
    </div>
  </header>

  <section id="hero">
    <h1>Unlock Your Ultimate Stay</h1>
    <p>Dive into deals on stylish hotels, comfortable homes, and beyond.</p>

    <div class="searchBar-container">
      <div class="searchBar-box">

        <!-- Where -->
        <div class="searchBar-field">
          <i class="fas fa-map-marker-alt"></i>
          <div class="field-content">
            <label>Where</label>
            <input type="text" id="destination" placeholder="Search destinations" />
          </div>
        </div>

        <!-- Check In -->
        <div class="searchBar-field" id="checkin-field">
          <i class="fas fa-calendar-alt"></i>
          <div class="field-content">
            <label>Check in</label>
            <input type="text" id="checkin" placeholder="Add date" readonly />
          </div>
        </div>

        <!-- Check Out -->
        <div class="searchBar-field" id="checkout-field">
          <i class="fas fa-calendar-alt"></i>
          <div class="field-content">
            <label>Check out</label>
            <input type="text" id="checkout" placeholder="Add date" readonly />
          </div>
        </div>

<!-- Guests -->
<div class="searchBar-field relative" id="guest-field">
  <i class="fas fa-user-friends"></i>
  <div class="field-content">
    <label>Guests</label>
    <input
      type="text"
      id="guests"
      readonly
      placeholder="Add guests"
      class="w-full text-sm outline-none bg-transparent mt-1 cursor-pointer"
    />
  </div>

<div id="guest-dropdown" class="hidden">
  <!-- Adults -->
  <div class="guest-row">
    <span>Adults</span>
    <div class="flex items-center">
      <button class="minus" data-type="adults">–</button>
      <span id="adults-count" class="count">2</span>
      <button class="plus" data-type="adults">+</button>
    </div>
  </div>

  <!-- Children -->
  <div class="guest-row">
    <span>Children</span>
    <div class="flex items-center">
      <button class="minus" data-type="children">–</button>
      <span id="children-count" class="count">0</span>
      <button class="plus" data-type="children">+</button>
    </div>
  </div>

  <!-- Pets -->
  <div class="pets-row">
    <input type="checkbox" id="pets" />
    <label for="pets">Bringing pets</label>
  </div>

  <!-- Done Button -->
  <button id="done-btn">Done</button>
</div>



        <!-- Search Button -->
        <button class="search-button"><i class="fas fa-search"></i></button>
      </div>
    </div>
  </section>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="script.js"></script>
</body>
</html>
